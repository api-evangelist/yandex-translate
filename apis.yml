aid: yandex-translate
name: Yandex Translate API
description: >-
  Yandex Translate is a machine translation REST API from Yandex that supports 100+ languages. It
  provides text translation between any supported language pair, automatic source language detection,
  and a translation dictionary with synonyms, translations, and examples. The API is part of the
  Yandex Cloud platform and uses neural machine translation to deliver high-quality translations
  for developers integrating multilingual capabilities into applications, websites, and services.
